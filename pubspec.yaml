name: drive_sync_flutter
description: >-
  Bidirectional file sync between device storage and Google Drive.
  SHA256-based change detection, pluggable conflict resolution, nested folder support.
version: 1.2.0
repository: https://github.com/arcanelabsio/drive_sync_flutter
issue_tracker: https://github.com/arcanelabsio/drive_sync_flutter/issues
topics:
  - google-drive
  - sync
  - backup
  - file-sync

environment:
  sdk: ^3.11.3

dependencies:
  googleapis: ^14.0.0
  http: ^1.4.0
  crypto: ^3.0.6
  path: ^1.9.1
  meta: ^1.16.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
